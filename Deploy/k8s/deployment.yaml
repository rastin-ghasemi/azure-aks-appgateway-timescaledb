apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigproject-app
  labels:
    app: bigproject-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bigproject-app
  template:
    metadata:
      labels:
        app: bigproject-app
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bigproject-app
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: bigproject-app
          image: bigprojectacr.azurecr.io/bigproject-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: "bigproject-pg-server.postgres.database.azure.com"
            - name: DB_USER
              value: "pgadmin"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              value: "postgres"
            - name: AAD_CLIENT_ID
              value: "0e5b9e57-5cc8-4315-a10c-2d44003439d1"
            - name: AAD_TENANT_ID
              value: "6c7e502c-4720-47e8-a688-cc1685086d4e"
            - name: AAD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aad-credentials
                  key: client-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
